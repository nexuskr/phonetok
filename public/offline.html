<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>오프라인 — Phonara</title>
<link rel="icon" href="/favicon.ico" />
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", system-ui, sans-serif;
    background: radial-gradient(ellipse at top, #1a1530 0%, #08070f 60%, #000 100%);
    color: #f5e9c8;
  }
  .wrap {
    min-height: 100%;
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
  }
  .card {
    width: 100%; max-width: 420px;
    background: linear-gradient(180deg, rgba(212,175,55,0.06), rgba(212,175,55,0.02));
    border: 1px solid rgba(212,175,55,0.25);
    border-radius: 20px;
    padding: 32px 24px;
    text-align: center;
    box-shadow: 0 24px 60px -20px rgba(212,175,55,0.25);
    backdrop-filter: blur(8px);
  }
  .badge {
    font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase;
    color: #d4af37; opacity: 0.9; margin-bottom: 12px;
  }
  h1 {
    font-size: 22px; margin: 0 0 10px; font-weight: 700;
    color: #f5e9c8; letter-spacing: -0.01em;
  }
  p { margin: 0 0 24px; line-height: 1.6; color: rgba(245,233,200,0.8); font-size: 14px; }
  button {
    appearance: none; border: 0; cursor: pointer;
    width: 100%; padding: 14px 20px;
    border-radius: 12px;
    background: linear-gradient(135deg, #d4af37 0%, #b8941f 100%);
    color: #08070f; font-weight: 700; font-size: 15px;
    box-shadow: 0 10px 24px -10px rgba(212,175,55,0.6);
    transition: transform .15s ease;
  }
  button:active { transform: scale(0.98); }
  .small { margin-top: 16px; font-size: 12px; opacity: 0.6; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="badge">Phonara · Offline</div>
      <h1>인터넷 연결을 확인해주세요</h1>
      <p>현재 네트워크에 연결할 수 없습니다.<br/>Wi-Fi 또는 모바일 데이터를 확인하신 후 다시 시도해주세요.</p>
      <button onclick="location.reload()">다시 시도</button>
      <div class="small">© Phonara · 黄金帝国</div>
    </div>
  </div>
</body>
</html>
