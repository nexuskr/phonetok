version: "3.9"

# 로컬 개발용 — Redis(SQS 대체), Postgres, MinIO(S3 대체)
services:
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: phonara
      POSTGRES_PASSWORD: phonara
      POSTGRES_DB: phonara_local
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: phonara
      MINIO_ROOT_PASSWORD: phonara_local_secret
    ports: ["9000:9000", "9001:9001"]
    volumes: ["miniodata:/data"]

  api:
    build: ./apps/api
    depends_on: [redis, postgres]
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgres://phonara:phonara@postgres:5432/phonara_local
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
    ports: ["3001:3000"]

  worker-render:
    build: ./apps/worker-render
    depends_on: [redis, minio]
    environment:
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: phonara-videos-local

  worker-upload:
    build: ./apps/worker-upload
    depends_on: [redis]
    environment:
      REDIS_URL: redis://redis:6379
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}

volumes:
  pgdata:
  miniodata:
