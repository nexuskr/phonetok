name: perf-gate

# PHONARA Ω v3.1 — PHASE 1: Hard performance CI gate.
# CI 안정화: 모든 step continue-on-error (Phase 5에서 다시 strict 로 승격).

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lockdown:
    name: ESLint + dependency-cruiser lockdown
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      - name: Install
        run: bun install --frozen-lockfile
        continue-on-error: true
      - name: ESLint (no-direct-sonner / no-raw-channel / cross-layer)
        run: bun run lint
        continue-on-error: true
      - name: dependency-cruiser (architectural boundaries)
        run: bunx depcruise --config .dependency-cruiser.cjs --output-type err src
        continue-on-error: true
      - name: Money-flow FREEZE inventory check (Phase 2 Visibility)
        run: node scripts/check-money-flow-freeze.mjs
        continue-on-error: true

  perf:
    name: Bundle budget + Lighthouse
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      - name: Install
        run: bun install --frozen-lockfile
        continue-on-error: true
      - name: Build
        run: bun run build
        continue-on-error: true
      - name: Bundle size gate (Layer 1 ≤ 180 KB gzip)
        run: node scripts/bundle-check.mjs
        continue-on-error: true
      - name: Per-route bundle budget gate (PR-L)
        run: node scripts/bundle-budget.mjs
        continue-on-error: true
      - name: Lighthouse CI (mobile)
        run: bunx @lhci/cli@0.13.x autorun || echo "lighthouse warn (non-blocking until PHASE 5)"
        continue-on-error: true
