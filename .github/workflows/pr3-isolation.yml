name: PR3 Isolation Guard

# CI 안정화: 비차단.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  pr3-isolation:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run PR3 isolation check
        run: node scripts/check-pr3-isolation.mjs
        continue-on-error: true
