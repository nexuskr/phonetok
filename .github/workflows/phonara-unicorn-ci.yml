name: phonara-unicorn-ci

# CI 안정화: 비차단 (Phase U 스캐폴드, 실배포 전).

on:
  push:
    branches: [main]
    paths: ["phonara-unicorn/**"]
  pull_request:
    paths: ["phonara-unicorn/**"]

jobs:
  build:
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      matrix:
        app: [api, worker-render, worker-upload]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build ${{ matrix.app }}
        continue-on-error: true
        run: docker build -t phonara-${{ matrix.app }}:ci ./phonara-unicorn/apps/${{ matrix.app }}

  terraform-validate:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Validate
        working-directory: phonara-unicorn/infra/terraform
        continue-on-error: true
        run: |
          terraform init -backend=false
          terraform validate
