name: E2E

# CI 안정화: E2E는 PR에서만 실행 (main push 차단 제거).
# 브라우저 설치/실행 자체가 sandbox에서 실패할 수 있으므로 비차단.

on:
  pull_request:

jobs:
  playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
      - run: bun install
        continue-on-error: true
      - name: Install Playwright browsers
        continue-on-error: true
        run: bunx playwright install --with-deps chromium
      - name: Run critical (mobile-ios @critical)
        continue-on-error: true
        run: bunx playwright test --config=e2e/playwright.config.ts --project=mobile-ios --grep @critical --workers=2
        env:
          SLACK_WEBHOOK_E2E: ${{ secrets.SLACK_WEBHOOK_E2E }}
      - name: Upload HTML report
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
