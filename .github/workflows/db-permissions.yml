name: DB Permission Lint

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  permission-lint:
    runs-on: ubuntu-latest
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install
        run: bun install --frozen-lockfile
      - name: Forbidden phrase check (i18n)
        run: node scripts/check-forbidden-phrases.mjs
      - name: SIM badge / KRW guard (PR-1)
        run: node scripts/check-sim-badge.mjs
      - name: Run RLS + permission baseline tests
        run: bunx vitest run src/test/rls-integrity.test.ts src/test/db-permissions.test.ts src/test/referral-window.test.ts
      - name: Supabase CLI linter
        if: ${{ secrets.SUPABASE_ACCESS_TOKEN != '' }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          npm i -g supabase
          supabase db lint --linked || true
