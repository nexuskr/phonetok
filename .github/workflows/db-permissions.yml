name: DB Permission Lint

# CI 안정화: 비차단.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  permission-lint:
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install
        run: bun install --frozen-lockfile
        continue-on-error: true
      - name: Forbidden phrase check (i18n)
        run: node scripts/check-forbidden-phrases.mjs
        continue-on-error: true
      - name: SIM badge / KRW guard (PR-1)
        run: node scripts/check-sim-badge.mjs
        continue-on-error: true
      - name: Run RLS + permission baseline tests
        run: bunx vitest run src/test/rls-integrity.test.ts src/test/db-permissions.test.ts src/test/referral-window.test.ts
        continue-on-error: true
      - name: Setup Deno (for RPC drift guard)
        uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x
      - name: RPC Drift Guard (client .rpc() ↔ DB pg_proc)
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
        run: deno run --allow-read --allow-net --allow-env scripts/check-rpc-drift.ts
        continue-on-error: true
      - name: Supabase CLI linter
        if: ${{ secrets.SUPABASE_ACCESS_TOKEN != '' }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        continue-on-error: true
        run: |
          npm i -g supabase
          supabase db lint --linked || true
