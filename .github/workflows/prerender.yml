name: Hybrid Prerender

# Phase 2: strict mode (job-level continue-on-error removed).
# Lighthouse 외 step 들은 모두 차단형으로 승격.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      - name: Install
        run: bun install --frozen-lockfile
      - name: Build
        run: bun run build
      - name: Upload dist
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist
          if-no-files-found: warn
          retention-days: 1

  prerender:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      - name: Install
        run: bun install --frozen-lockfile
      - name: Restore dist
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist
      - name: Install Playwright (chromium)
        run: bunx playwright install --with-deps chromium
      - name: Run prerender
        run: node scripts/prerender.mjs
      - name: Prerender leak check
        run: node scripts/check-prerender-leak.mjs
      - name: Upload prerender report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: prerender-report-${{ github.sha }}
          path: reports/prerender-report.json
          if-no-files-found: warn
          retention-days: 7
