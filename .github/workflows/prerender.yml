name: Hybrid Prerender

# CI 안정화: prerender 전체 비차단. Vercel 배포에 영향 없음.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci --no-audit --no-fund || npm install --no-audit --no-fund
        continue-on-error: true
      - run: npm run build
        continue-on-error: true
      - name: Upload dist
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist
          if-no-files-found: warn
          retention-days: 1

  prerender:
    needs: build
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci --no-audit --no-fund || npm install --no-audit --no-fund
        continue-on-error: true
      - name: Restore dist
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist
      - name: Install Playwright (chromium)
        continue-on-error: true
        run: npx playwright install --with-deps chromium
      - name: Run prerender + leak check
        continue-on-error: true
        run: |
          node scripts/prerender.mjs || true
          node scripts/check-prerender-leak.mjs || true
      - name: Upload prerender report
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: prerender-report-${{ github.sha }}
          path: reports/prerender-report.json
          if-no-files-found: warn
          retention-days: 7
