name: bundle-budget

# PR-L — Per-route bundle budget. CI 안정화: 비차단.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  budget:
    name: Per-route bundle budget
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install
        run: bun install --frozen-lockfile
        continue-on-error: true

      - name: Build (vite)
        run: bun run build
        continue-on-error: true

      - name: Operator isolation gate (PR-K)
        run: node scripts/check-operator-isolation.mjs
        continue-on-error: true

      - name: Money-flow freeze gate
        run: node scripts/check-money-flow-freeze.mjs
        continue-on-error: true

      - name: Per-route bundle budget gate (PR-L)
        id: budget
        run: node scripts/bundle-budget.mjs
        continue-on-error: true

      - name: Upload bundle-budget snapshot
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: bundle-budget-report
          path: |
            reports/bundle-budget.*.json
            reports/bundle-budget.comment.md

      - name: Sticky PR comment (size diff)
        if: github.event_name == 'pull_request' && always()
        continue-on-error: true
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: bundle-budget
          path: reports/bundle-budget.comment.md
